name: preprocessing-docker

on:
  push:
    branches: [ "main" ]
    paths: 'preprocessing_component/**'
  workflow_dispatch:
    
permissions:
  contents: read
  
# Provide secret and variable context as env, due to restrictions on if command.
env:
  REGISTRY: ghcr.io
  # github.repository as <account>/<repo>
  IMAGE_NAME: ${{ github.repository }}-preprocessing
  ENABLE_SCOUT_REPORT: ${{ vars.ENABLE_SCOUT_REPORT }}
  DOCKER_USER: ${{ secrets.DOCKER_USER }}
  DOCKER_PAT: ${{ secrets.DOCKER_PAT }}

jobs:
  
  image-build-n-push:
    name: Build and Push a docker image of an Emerald
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./privacy_evaluation_component
        
    permissions:
      contents: read
      packages: write
      # This is used to complete the identity challenge
      # with sigstore/fulcio when running outside of PRs.
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      # Install the cosign tool 
      # https://github.com/sigstore/cosign-installer
      - name: Install cosign
        uses: sigstore/cosign-installer@6e04d228eb30da1757ee4e1dd75a0ec73a653e06 #v3.1.1
        with:
          cosign-release: 'v2.1.1'

      # Set up BuildKit Docker container builder to be able to build
      # multi-platform images and export cache
      # https://github.com/docker/setup-buildx-action
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@f95db51fddba0c2d1ec667646a06c2ce06100226 # v3.0.0

      # Login against a Docker registry 
      # https://github.com/docker/login-action
      - name: Log into registry ${{ env.REGISTRY }}
        # Skip this step for local executions through the act
        if: ${{ !env.ACT }}
        uses: docker/login-action@343f7c4344506bcbf9b4de18042ae17996df046d # v3.0.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Extract metadata (tags, labels) for Docker
      # https://github.com/docker/metadata-action
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@96383f45573cb7f253c731d3b3ab81c87ef81934 # v5.0.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      # Build and push Docker image with Buildx (don't push on PR)
      # https://github.com/docker/build-push-action
      - name: Build and push Docker image
        id: build-and-push
        uses: docker/build-push-action@0565240e2d4ab88bba5387d719585280857ece09 # v5.0.0
        with:
          context: ./preprocessing_component/
          push: ${{ !env.ACT }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Log into Docker Hub
        if: ${{ env.ENABLE_SCOUT_REPORT == 'true' }}
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_USER }}
          password: ${{ env.DOCKER_PAT }}

      - name: Docker Scout
        id: docker-scout
        if: ${{ env.ENABLE_SCOUT_REPORT == 'true' }}
        uses: docker/scout-action@v1.2.2
        with:
          command: sbom,recommendations, cves
          image: ${{ steps.meta.outputs.tags }}
