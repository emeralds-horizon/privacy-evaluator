name: privacy-evaluation-docker

on:
  push:
    branches: [ "main", "ci_cd" ]
    paths: 
      - 'privacy_evaluation_component/**'
      - '.github/workflows/preprocessing-docker.yaml'
  workflow_dispatch:
  schedule:
    # Runs on the first day of every month at 00:00 UTC.
    #- cron: '0 0 1 * *'
    - cron: '0 * * * *'    # at minute 0
    - cron: '20 * * * *'   # at minute 20
    - cron: '40 * * * *'   # at minute 40
    
#permissions:
#  contents: read
  
# Provide secret and variable context as env, due to restrictions on if command.
env:
  REGISTRY: ghcr.io
  # github.repository as <account>/<repo>
  IMAGE_NAME: ${{ github.repository }}
  ENABLE_SCOUT_REPORT: ${{ vars.ENABLE_SCOUT_REPORT }}
  DOCKER_USER: ${{ secrets.DOCKER_USER }}
  DOCKER_PAT: ${{ secrets.DOCKER_PAT }}

jobs:
  
  image-build-n-push-privacy-evaluation:
    name: Build and Push a docker image of an Emerald
    runs-on: ubuntu-latest
        
    permissions:
      contents: write
      packages: write
      # This is used to complete the identity challenge
      # with sigstore/fulcio when running outside of PRs.
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          # For scheduled runs, explicitly check out the ci_cd branch
          ref: ${{ github.event_name == 'schedule' && 'ci_cd' || github.ref }}

      # Install the cosign tool 
      # https://github.com/sigstore/cosign-installer
      - name: Install cosign
        uses: sigstore/cosign-installer@v3.5.0
      - name: Check install!
        run: cosign version

      # Set up BuildKit Docker container builder to be able to build
      # multi-platform images and export cache
      # https://github.com/docker/setup-buildx-action
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@f95db51fddba0c2d1ec667646a06c2ce06100226 # v3.0.0

      # Login against a Docker registry 
      # https://github.com/docker/login-action
      - name: Log into registry ${{ env.REGISTRY }}
        # Skip this step for local executions through the act
        if: ${{ !env.ACT }}
        uses: docker/login-action@343f7c4344506bcbf9b4de18042ae17996df046d # v3.0.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Extract metadata (tags, labels) for Docker
      # https://github.com/docker/metadata-action
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@96383f45573cb7f253c731d3b3ab81c87ef81934 # v5.0.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha

      # Build and push Docker image with Buildx (don't push on PR)
      # https://github.com/docker/build-push-action
      - name: Build and push Docker image
        id: build-and-push
        uses: docker/build-push-action@0565240e2d4ab88bba5387d719585280857ece09 # v5.0.0
        with:
          context: ./privacy_evaluation_component/
          push: ${{ !env.ACT }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      # Sign the resulting Docker image digest except on PRs.
      # This will only write to the public Rekor transparency log when the Docker
      # repository is public to avoid leaking data.  If you would like to publish
      # transparency data even for private images, pass --force to cosign below.
      # https://github.com/sigstore/cosign
      - name: Sign the published Docker image
        if: ${{ github.event_name != 'pull_request' }}
        env:
          # https://docs.github.com/en/actions/security-guides/security-hardening-for-github-actions#using-an-intermediate-environment-variable
          TAGS: ${{ steps.meta.outputs.tags }}
          DIGEST: ${{ steps.build-and-push.outputs.digest }}
        # This step uses the identity token to provision an ephemeral certificate
        # against the sigstore community Fulcio instance.
        run: echo "${TAGS}" | xargs -I {} cosign sign --yes {}@${DIGEST}

      - name: Log into Docker Hub
        if: ${{ env.ENABLE_SCOUT_REPORT == 'true' }}
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_USER }}
          password: ${{ env.DOCKER_PAT }}

      - name: Docker Scout
        id: docker-scout
        if: ${{ env.ENABLE_SCOUT_REPORT == 'true' }}
        uses: docker/scout-action@v1.2.2
        with:
          command: sbom,recommendations, cves
          image: ${{ steps.meta.outputs.tags }}

      - name: Install yq
        run: |
          sudo wget https://github.com/mikefarah/yq/releases/download/v4.13.0/yq_linux_amd64 -O /usr/bin/yq
          sudo chmod +x /usr/bin/yq

      - name: Update Kubernetes manifest with new image
        run: |
          yq e '.spec.template.spec.containers[0].image = "${{ steps.meta.outputs.tags }}"' -i ./privacy_evaluation_component/kubernetes/privacy-eval-deployment.yaml
          
      - name: Configure git
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

      - name: Commit and push updated manifest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git add ./privacy_evaluation_component/kubernetes/privacy-eval-deployment.yaml
          git commit -m "Update Kubernetes manifest with new image tag ${{ steps.meta.outputs.tags }}"
          git pull --rebase origin ${{ github.ref }}
          git push origin ${{ github.ref }}
  
